<!DOCTYPE html>
<html>
<head>
    <title>TIPHON - Surveillance Maritime</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10; --panel: #0f1318; --border: #1e2a38;
            --accent: #00d4ff; --accent2: #00ff9d; --warn: #ff6b35;
            --text: #c8d8e8; --dim: #4a6070;
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui: 'Rajdhani', sans-serif;
        }
        
        body { 
            font-family: var(--font-ui); background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; 
        }

        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 24px; border-bottom: 1px solid var(--border); background: var(--panel); 
            height: 60px; box-sizing: border-box;
        }
        
        /* FIX: Hauteur fixe pour empêcher l'étirement vers le bas */
        main { 
            display: grid; grid-template-columns: 350px 1fr 280px; 
            height: calc(100vh - 60px); overflow: hidden; 
        }
        
        #console-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        
        /* FIX: Zone de texte scrollable */
        #terminal { 
            flex: 1; overflow-y: auto; padding: 14px; 
            font-family: var(--font-mono); font-size: 0.75rem; 
            background: #080b0f; border-top: 1px solid var(--border);
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }

        #viewer-panel { display: flex; flex-direction: column; overflow: hidden; }
        #canvas-zone { flex: 1; background: #05070a; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #jetson_image { max-width: 95%; max-height: 95%; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        
        #history-panel { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #history-list { flex: 1; overflow-y: auto; padding: 10px; }

        .history-item { 
            padding: 10px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; 
            font-size: 0.8rem; border-radius: 4px; transition: 0.2s;
        }
        .history-item:hover { border-color: var(--accent); background: rgba(0, 212, 255, 0.05); }
        .history-item.active { border-color: var(--accent2); background: rgba(0, 255, 157, 0.1); }

        .status-tag { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; transition: 0.5s; }
        
        /* États des voyants */
        .dot.esp-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .dot.jetson-standby { background: #000000; box-shadow: 0 0 10px #000000; }
        .dot.jetson-active { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }

        .btn-cmd { border: none; padding: 8px 18px; cursor: pointer; font-family: var(--font-ui); font-weight: bold; border-radius: 2px; transition: 0.2s; }
        .btn-start { background: var(--accent2); color: #000; }
        .btn-stop { background: var(--warn); color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>&#x2B21; TIPHON &mdash; Système d'Interception</h1>
    
    <div style="display:flex; gap:25px; align-items: center;">
        <div class="status-tag">LIAISON ESP: <div id="esp-dot" class="dot"></div></div>
        <div class="status-tag">AI CORE: <div id="jetson-dot" class="dot"></div></div>
        
        <div style="display:flex; gap:10px; border-left: 1px solid var(--border); padding-left: 20px;">
            <button onclick="sendCmd('START')" class="btn-cmd btn-start">LANCER IA</button>
            <button onclick="sendCmd('STOP')" class="btn-cmd btn-stop">ARRÊTER</button>
        </div>

        <button id="quit-btn" onclick="quitApp()" style="background:none; color:var(--dim); border:1px solid var(--border); cursor:pointer; padding:4px 10px; font-size: 0.7rem;">QUITTER</button>
    </div>
</header>

<main>
    <div id="console-panel">
        <div style="padding:10px; font-size:0.7rem; color:var(--accent); font-weight: bold;">[ LOGS SYSTÈME ]</div>
        <div id="terminal"></div>
    </div>

    <div id="viewer-panel">
        <div id="canvas-zone">
            <img id="jetson_image" src="" style="display:none;">
            <div id="placeholder" style="color:var(--dim); font-family:var(--font-mono);">PAS DE FLUX ENTRANT</div>
        </div>
        <div id="img-info" style="padding:12px; font-family:var(--font-mono); font-size:0.9rem; text-align:center; border-top:1px solid var(--border); background: var(--panel);">CIBLE : AUCUNE</div>
    </div>

    <div id="history-panel">
        <div style="padding:10px; font-size:0.7rem; color:var(--accent); font-weight: bold;">[ HISTORIQUE ]</div>
        <div id="history-list"></div>
    </div>
</main>

<script>
    var socket = io();
    var historyData = {}; 

    // Connexion initiale : on demande l'état au serveur
    socket.on('connect', function() {
        log("Liaison établie avec le serveur PC", "sys");
    });

    // Gestion voyant ESP32
    socket.on('esp_status', function(msg) {
        const dot = document.getElementById('esp-dot');
        if (msg.connected) {
            dot.className = 'dot esp-on';
            log("Module COM (ESP32) détecté", "sys");
        } else {
            dot.className = 'dot';
            log("Module COM déconnecté", "warn");
        }
    });

    // Gestion voyant JETSON (AI CORE)
    socket.on('jetson_status', function(msg) {
        const dot = document.getElementById('jetson-dot');
        if (msg.online) {
            if (msg.status === 'active') {
                dot.className = 'dot jetson-active';
            } else {
                dot.className = 'dot jetson-standby';
            }
        } else {
            dot.className = 'dot';
        }
    });

    function sendCmd(cmd) {
        fetch('/remote_cmd/' + cmd, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if(data.status === "ok") log("COMMANDE ENVOYÉE : " + cmd, 'sys');
        });
    }

    socket.on('new_alert', function(msg) {
        log("CIBLE IDENTIFIÉE : " + msg.label, 'warn');
        
        var item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<strong>${msg.label}</strong><br><small style="color:var(--dim)">${new Date().toLocaleTimeString()}</small>`;
        
        historyData[msg.file] = msg.img;
        item.onclick = function() { 
            displayImage(msg.file, msg.label);
            document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
        };
        
        var list = document.getElementById('history-list');
        list.insertBefore(item, list.firstChild);
        displayImage(msg.file, msg.label);
        item.classList.add('active');
    });

    function displayImage(fileId, label) {
        var img = document.getElementById('jetson_image');
        img.src = "data:image/jpeg;base64," + historyData[fileId];
        img.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('img-info').textContent = "CIBLE : " + label;
    }

    function log(text, type) {
        var terminal = document.getElementById('terminal');
        var line = document.createElement('div');
        line.style.marginBottom = '5px';
        line.style.color = type === 'warn' ? 'var(--warn)' : 'var(--dim)';
        line.innerHTML = `<span style="color:#2a3a4a">></span> [${new Date().toLocaleTimeString()}] ${text}`;
        
        terminal.appendChild(line);
        
        // FIX: Scroll automatique vers le bas
        terminal.scrollTop = terminal.scrollHeight;

        // On limite à 40 lignes pour les performances
        if (terminal.childNodes.length > 40) {
            terminal.removeChild(terminal.firstChild);
        }
    }

    function quitApp() { 
        if(confirm("Fermer TIPHON ?")) {
            fetch('/quit', {method:'POST'}); 
            setTimeout(()=>window.close(), 500); 
        }
    }
</script>
</body>
</html>
