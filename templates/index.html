<!DOCTYPE html>
<html>
<head>
    <title>TIPHON - Surveillance Maritime</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10; --panel: #0f1318; --border: #1e2a38;
            --accent: #00d4ff; --accent2: #00ff9d; --warn: #ff6b35;
            --text: #c8d8e8; --dim: #4a6070;
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui: 'Rajdhani', sans-serif;
        }
        
        body { 
            font-family: var(--font-ui); background: var(--bg); color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; 
        }

        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 24px; border-bottom: 1px solid var(--border); background: var(--panel); 
            height: 60px; box-sizing: border-box;
        }
        
        main { 
            display: grid; grid-template-columns: 350px 1fr 280px; 
            height: calc(100vh - 60px); overflow: hidden; 
        }
        
        #console-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        
        #terminal { 
            flex: 1; overflow-y: auto; padding: 14px; 
            font-family: var(--font-mono); font-size: 0.75rem; 
            background: #080b0f; border-top: 1px solid var(--border);
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }

        #viewer-panel { display: flex; flex-direction: column; overflow: hidden; }
        #canvas-zone { flex: 1; background: #05070a; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #jetson_image { max-width: 95%; max-height: 95%; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        
        #history-panel { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        #history-list { flex: 1; overflow-y: auto; padding: 10px; }

        .history-item { 
            padding: 10px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; 
            font-size: 0.8rem; border-radius: 4px; transition: 0.2s;
            border-left: 5px solid transparent;
        }
        .history-item:hover { border-color: var(--accent); background: rgba(0, 212, 255, 0.05); }
        .history-item.active { background: rgba(255, 255, 255, 0.05); }

        /* Couleurs d'état Historique */
        .history-item.new { border-left: 5px solid var(--accent2) !important; }
        .history-item.confirmed { border-left: 5px solid #ff4444 !important; }

        .status-tag { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; transition: 0.5s; }
        
        .dot.esp-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        
        /* États des voyants Jetson */
        .dot.jetson-standby { background: #111; box-shadow: none; } 
        .dot.jetson-active { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); }

        .telemetry-val { color: var(--accent); font-weight: bold; }

        .btn-cmd { border: none; padding: 8px 18px; cursor: pointer; font-family: var(--font-ui); font-weight: bold; border-radius: 2px; transition: 0.2s; }
        .btn-start { background: var(--accent2); color: #000; }
        .btn-stop { background: var(--warn); color: #fff; }

        #decision-zone {
            display: none; 
            padding: 15px; gap: 20px; justify-content: center;
            background: var(--panel); border-top: 1px solid var(--border);
        }

        .btn-decision {
            padding: 12px 24px; font-weight: bold; cursor: pointer; border: none;
            border-radius: 4px; font-family: var(--font-ui); text-transform: uppercase;
        }
        .btn-confirm { background: #ff4444; color: white; }
        .btn-false { background: var(--dim); color: white; }
    </style>
</head>
<body>

<header>
    <h1>&#x2B21; TIPHON &mdash; Système d'Interception</h1>
    <div style="display:flex; gap:25px; align-items: center;">
        <div class="status-tag">LIAISON ESP: <div id="esp-dot" class="dot"></div></div>
        
        <div class="status-tag">
            AI CORE: <div id="jetson-dot" class="dot"></div>
            <span style="margin-left:15px; border-left: 1px solid var(--border); padding-left: 15px; font-family:var(--font-mono); font-size: 0.7rem; display: flex; gap: 10px;">
                <span><span id="disp-fps" class="telemetry-val">--</span> FPS</span> |
                <span>CPU: <span id="disp-cpu" class="telemetry-val">--</span>°C</span> |
                <span>GPU: <span id="disp-gpu" class="telemetry-val">--</span>°C</span>
            </span>
        </div>

        <div style="display:flex; gap:10px; border-left: 1px solid var(--border); padding-left: 20px;">
            <button onclick="sendCmd('START')" class="btn-cmd btn-start">LANCER IA</button>
            <button onclick="sendCmd('STOP')" class="btn-cmd btn-stop">ARRÊTER</button>
        </div>
        <button id="quit-btn" onclick="quitApp()" style="background:none; color:var(--dim); border:1px solid var(--border); cursor:pointer; padding:4px 10px; font-size: 0.7rem;">QUITTER</button>
    </div>
</header>

<main>
    <div id="console-panel">
        <div style="padding:10px; font-size:0.7rem; color:var(--accent); font-weight: bold;">[ LOGS SYSTÈME ]</div>
        <div id="terminal"></div>
    </div>

    <div id="viewer-panel">
        <div id="canvas-zone">
            <img id="jetson_image" src="" style="display:none;">
            <div id="placeholder" style="color:var(--dim); font-family:var(--font-mono);">PAS DE FLUX ENTRANT</div>
        </div>
        <div id="img-info" style="padding:10px; font-family:var(--font-mono); font-size:0.9rem; text-align:center; background: #000;">CIBLE : AUCUNE</div>
        <div id="decision-zone">
            <button onclick="confirmAlert()" class="btn-decision btn-confirm">⚠️ Confirmer Alerte</button>
            <button onclick="falseAlert()" class="btn-decision btn-false">❌ Fausse Alerte</button>
        </div>
    </div>

    <div id="history-panel">
        <div style="padding:10px; font-size:0.7rem; color:var(--accent); font-weight: bold;">[ HISTORIQUE ]</div>
        <div id="history-list"></div>
    </div>
</main>

<script>
    var socket = io();
    var historyData = {}; 
    var currentAlertId = null;

    // --- SOCKETS ---
    socket.on('connect', () => log("Liaison établie avec le serveur PC", "sys"));

    socket.on('esp_status', (msg) => {
        const dot = document.getElementById('esp-dot');
        dot.className = msg.connected ? 'dot esp-on' : 'dot';
        log(msg.connected ? "Module COM détecté" : "Module COM déconnecté", msg.connected ? "sys" : "warn");
    });

    // Mise à jour pour gérer la télémétrie reçue dans le heartbeat
    socket.on('jetson_status', (msg) => {
        const dot = document.getElementById('jetson-dot');
        
        if (msg.status === 'active') {
            dot.className = 'dot jetson-active';
            
            // Mise à jour des valeurs textuelles
            document.getElementById('disp-fps').textContent = msg.fps || "0";
            document.getElementById('disp-cpu').textContent = msg.cpu || "--";
            document.getElementById('disp-gpu').textContent = msg.gpu || "--";
            
            // Alerte visuelle si GPU chauffe trop (> 75°C)
            document.getElementById('disp-gpu').style.color = msg.gpu > 75 ? 'var(--warn)' : 'var(--accent)';
        } else {
            dot.className = 'dot jetson-standby';
            // Reset des valeurs quand hors-ligne
            document.getElementById('disp-fps').textContent = "--";
            document.getElementById('disp-cpu').textContent = "--";
            document.getElementById('disp-gpu').textContent = "--";
        }
    });

    socket.on('new_alert', (msg) => {
        log("CIBLE IDENTIFIÉE : " + msg.label, 'warn');
        historyData[msg.file] = msg.img;
        
        const item = document.createElement('div');
        item.className = 'history-item new';
        item.id = 'item-' + msg.file;
        item.innerHTML = `<strong>${msg.label}</strong><br><small style="color:var(--dim)">${new Date().toLocaleTimeString()}</small>`;
        
        item.onclick = () => displayImage(msg.file, msg.label);
        
        const list = document.getElementById('history-list');
        list.insertBefore(item, list.firstChild);
        
        displayImage(msg.file, msg.label);
    });

    // --- FONCTIONS ---
    function displayImage(fileId, label) {
        currentAlertId = fileId;
        const img = document.getElementById('jetson_image');
        img.src = "data:image/jpeg;base64," + historyData[fileId];
        img.style.display = 'block';
        
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('img-info').textContent = "CIBLE : " + label;
        document.getElementById('decision-zone').style.display = 'flex';
        
        document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById('item-' + fileId);
        if(activeItem) activeItem.classList.add('active');
    }

    function confirmAlert() {
        if(!currentAlertId) return;
        const item = document.getElementById('item-' + currentAlertId);
        if(item) {
            item.classList.remove('new');
            item.classList.add('confirmed');
            log("ALERTE CONFIRMÉE (Rouge)", "sys");
        }
    }

    function falseAlert() {
        if(!currentAlertId) return;
        const item = document.getElementById('item-' + currentAlertId);
        if(item) {
            item.remove();
            delete historyData[currentAlertId];
            
            document.getElementById('jetson_image').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
            document.getElementById('img-info').textContent = "CIBLE : AUCUNE";
            document.getElementById('decision-zone').style.display = 'none';
            currentAlertId = null;
            
            log("ALERTE SUPPRIMÉE", "dim");
        }
    }

    function sendCmd(cmd) {
        fetch('/remote_cmd/' + cmd, {method: 'POST'})
        .then(r => r.json())
        .then(data => { if(data.status === "ok") log("COMMANDE ENVOYÉE : " + cmd, 'sys'); });
    }

    function log(text, type) {
        const terminal = document.getElementById('terminal');
        const line = document.createElement('div');
        line.style.marginBottom = '5px';
        line.style.color = type === 'warn' ? 'var(--warn)' : 'var(--dim)';
        line.innerHTML = `<span style="color:#2a3a4a">></span> [${new Date().toLocaleTimeString()}] ${text}`;
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
        if (terminal.childNodes.length > 40) terminal.removeChild(terminal.firstChild);
    }

    function quitApp() { 
        if(confirm("Fermer TIPHON ?")) {
            fetch('/quit', {method:'POST'}); 
            setTimeout(()=>window.close(), 500); 
        }
    }
</script>
</body>
</html>
