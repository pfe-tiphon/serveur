<!DOCTYPE html>
<html>
<head>
    <title>TIPHON - Surveillance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... (Garder tes styles de base) ... */
        :root {
            --bg: #0a0c10; --panel: #0f1318; --border: #1e2a38;
            --accent: #00d4ff; --accent2: #00ff9d; --warn: #ff6b35;
            --text: #c8d8e8; --dim: #4a6070;
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui: 'Rajdhani', sans-serif;
        }
        body { font-family: var(--font-ui); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-bottom: 1px solid var(--border); background: var(--panel); }
        
        main { display: grid; grid-template-columns: 300px 1fr 280px; flex: 1; overflow: hidden; }
        
        /* Colonne Droite : Historique */
        #history-panel { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        #history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { 
            padding: 10px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; 
            font-size: 0.8rem; border-radius: 4px; transition: 0.2s;
        }
        .history-item:hover { border-color: var(--accent); background: rgba(0, 212, 255, 0.05); }
        .history-item.active { border-color: var(--accent2); background: rgba(0, 255, 157, 0.1); }

        #terminal { flex: 1; overflow-y: auto; padding: 14px; font-family: var(--font-mono); font-size: 0.75rem; background: #080b0f; }
        #canvas-zone { flex: 1; background: #05070a; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #jetson_image { max-width: 95%; max-height: 95%; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .status-tag { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .dot.on { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    </style>
</head>
<body>

<header>
    <h1>&#x2B21; TIPHON &mdash; Système d'Interception</h1>
    <div style="display:flex; gap:20px;">
        <div class="status-tag">ESP32 BRIDGE: <div id="esp-dot" class="dot"></div></div>
        <div class="status-tag">WEB SERVER: <div id="web-dot" class="dot on"></div></div>
        <button id="quit-btn" onclick="quitApp()" style="background:none; color:var(--warn); border:1px solid var(--border); cursor:pointer; padding:4px 8px;">QUITTER</button>
    </div>
</header>

<main>
    <div id="console-panel" style="display:flex; flex-direction:column; border-right: 1px solid var(--border);">
        <div style="padding:10px; font-size:0.7rem; color:var(--dim); border-bottom:1px solid var(--border);">LOGS SYSTÈME</div>
        <div id="terminal"></div>
    </div>

    <div id="viewer-panel" style="display:flex; flex-direction:column;">
        <div id="canvas-zone">
            <img id="jetson_image" src="" style="display:none;">
            <div id="placeholder">EN ATTENTE D'ALERTE...</div>
        </div>
        <div id="img-info" style="padding:8px; font-family:var(--font-mono); font-size:0.8rem; text-align:center; border-top:1px solid var(--border);">CIBLE : AUCUNE</div>
    </div>

    <div id="history-panel">
        <div style="padding:10px; font-size:0.7rem; color:var(--dim); border-bottom:1px solid var(--border);">HISTORIQUE ALERTES</div>
        <div id="history-list">
            </div>
    </div>
</main>

<script>
    var socket = io();
    var historyData = {}; // Pour stocker les images en local session

    socket.on('esp_status', function(msg) {
        document.getElementById('esp-dot').className = msg.connected ? 'dot on' : 'dot';
        log(msg.connected ? 'Liaison ESP32 active' : 'Liaison ESP32 perdue', 'sys');
    });

    socket.on('new_alert', function(msg) {
        // Ajouter à la console
        log("ALERTE : " + msg.label, 'warn');
        
        // Ajouter à l'historique à droite
        var item = document.createElement('div');
        item.className = 'history-item';
        item.id = 'item-' + msg.file;
        item.innerHTML = `<strong>${msg.label}</strong><br><small>${new Date().toLocaleTimeString()}</small>`;
        
        historyData[msg.file] = msg.img;
        
        item.onclick = function() { 
            displayImage(msg.file, msg.label);
            document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
        };
        
        var list = document.getElementById('history-list');
        list.insertBefore(item, list.firstChild);

        // Afficher directement si c'est la dernière reçue
        displayImage(msg.file, msg.label);
    });

    function displayImage(fileId, label) {
        var img = document.getElementById('jetson_image');
        img.src = "data:image/jpeg;base64," + historyData[fileId];
        img.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('img-info').textContent = "CIBLE : " + label;
    }

    function log(text, type) {
        var terminal = document.getElementById('terminal');
        var line = document.createElement('div');
        line.style.color = type === 'warn' ? '#ff6b35' : '#4a6070';
        line.innerHTML = `[${new Date().toLocaleTimeString()}] ${text}`;
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function quitApp() { fetch('/quit', {method:'POST'}); setTimeout(()=>window.close(), 500); }
</script>
</body>
</html>
